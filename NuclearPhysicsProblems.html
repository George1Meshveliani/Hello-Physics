<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nuclear Physics: Alpha, Beta, Gamma</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- KaTeX -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <style>
    .animate-slide {
      animation: slideIn 0.25s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans">

<div class="min-h-screen p-4 md:p-8">
  <div class="max-w-4xl mx-auto">

    <!-- HEADER -->
    <header class="mb-6 text-center">
      <div class="flex justify-center mb-4">
        <div class="bg-emerald-600 p-3 rounded-2xl shadow-lg shadow-emerald-200">
          ☢
        </div>
      </div>
      <h1 class="text-4xl font-extrabold mb-2">Nuclear Physics Problems</h1>
      <p class="text-slate-500 text-lg">
        Alpha, beta-plus, beta-minus, and gamma decay — simple and medium level.
      </p>
    </header>

    <!-- FORMULA TOGGLE -->
    <section class="mb-8 bg-white border border-emerald-100 rounded-2xl shadow-sm overflow-hidden">
      <button onclick="toggleFormulas()"
        class="w-full flex justify-between items-center p-4 bg-emerald-600 text-white font-bold">
        <span>∑ NUCLEAR DECAY FORMULA REFERENCE</span>
        <span id="formulaArrow">▲</span>
      </button>

      <div id="formulaBox" class="p-4 grid md:grid-cols-2 gap-4 bg-emerald-50/30"></div>
    </section>

    <!-- TABS -->
    <div class="flex bg-slate-200 p-1 rounded-xl mb-8">
      <button class="tab-btn active" onclick="setTab('Simple')">Simple (40)</button>
      <button class="tab-btn" onclick="setTab('Medium')">Medium (20)</button>
    </div>

    <!-- QUESTIONS -->
    <div id="questionList" class="space-y-4"></div>

    <!-- FOOTER -->
    <footer class="mt-12 text-center border-t pt-8 text-slate-400 text-sm">
      Mass number $A$, atomic number $Z$. $1\\,\\text{u} = 931.5\\,\\text{MeV}/c^2$.
    </footer>
  </div>
</div>

<script>
/* ------------------ Math Rendering ------------------ */
function renderMath(el, text) {
  const parts = text.split(/(\$[^$]+\$)/g);
  el.innerHTML = "";

  parts.forEach(part => {
    if (part.startsWith("$")) {
      const span = document.createElement("span");
      katex.render(part.slice(1, -1), span, { throwOnError: false });
      span.className = "mx-1 text-emerald-900";
      el.appendChild(span);
    } else {
      el.appendChild(document.createTextNode(part));
    }
  });
}

/* ------------------ DATA ------------------ */
const formulas = [
  ["Decay law", "$N(t) = N_0 e^{-\\lambda t}$"],
  ["Half-life", "$T_{1/2} = \\frac{\\ln 2}{\\lambda} = \\frac{0.693}{\\lambda}$"],
  ["Activity", "$A = \\lambda N$, $A(t) = A_0 e^{-\\lambda t}$"],
  ["Alpha decay", "${}^{A}_{Z}X \\to {}^{A-4}_{Z-2}Y + {}^4_2\\alpha$"],
  ["Beta-minus", "${}^{A}_{Z}X \\to {}^{A}_{Z+1}Y + e^- + \\bar{\\nu}_e$"],
  ["Beta-plus", "${}^{A}_{Z}X \\to {}^{A}_{Z-1}Y + e^+ + \\nu_e$"],
  ["Gamma decay", "${}^{A}_{Z}X^* \\to {}^{A}_{Z}X + \\gamma$ (no $A$, $Z$ change)"],
  ["Number after $n$ half-lives", "$N = N_0 \\cdot 2^{-n}$"],
];

const questions = {
  Simple: [
    { q: "1. In alpha decay, by how much does the mass number $A$ change? By how much does the atomic number $Z$ change?",
      s: "Alpha decay emits a helium-4 nucleus (${}^4_2\\alpha$). So $\\Delta A = -4$ and $\\Delta Z = -2$." },
    { q: "2. Complete the alpha decay (find the daughter): ${}^{238}_{92}\\mathrm{U} \\to \\,?\\, + {}^4_2\\alpha$.",
      s: "Alpha: $A$ decreases by 4, $Z$ by 2. Daughter: $A = 234$, $Z = 90$ (thorium).\n\n${}^{238}_{92}\\mathrm{U} \\to {}^{234}_{90}\\mathrm{Th} + {}^4_2\\alpha$." },
    { q: "3. How many protons and how many neutrons are in ${}^{226}_{88}\\mathrm{Ra}$? (Radium-226.)",
      s: "Protons $= Z = 88$. Neutrons $= A - Z = 226 - 88 = 138$." },
    { q: "4. Radium-226 (${}^{226}_{88}\\mathrm{Ra}$) decays by alpha. What are the mass number $A$ and atomic number $Z$ of the daughter? How many protons and neutrons does the daughter have?",
      s: "Daughter: $A = 222$, $Z = 86$ (radon, Rn). Protons $= 86$, neutrons $= 222 - 86 = 136$." },
    { q: "5. In beta-minus decay, what happens to $A$ and $Z$?",
      s: "A neutron turns into a proton: $\\Delta Z = +1$, $\\Delta A = 0$." },
    { q: "6. Complete the beta-minus decay: ${}^{14}_{6}\\mathrm{C} \\to \\,?\\, + e^- + \\bar{\\nu}_e$.",
      s: "Beta-minus: $A$ unchanged, $Z$ increases by 1. Daughter: $A = 14$, $Z = 7$ (nitrogen).\n\n${}^{14}_{6}\\mathrm{C} \\to {}^{14}_{7}\\mathrm{N} + e^- + \\bar{\\nu}_e$." },
    { q: "7. How many protons and neutrons in ${}^{14}_{6}\\mathrm{C}$? In the daughter nucleus after this $\\beta^-$ decay?",
      s: "Carbon-14: protons $= 6$, neutrons $= 14 - 6 = 8$.\n\nDaughter ${}^{14}_{7}\\mathrm{N}$: protons $= 7$, neutrons $= 14 - 7 = 7$." },
    { q: "8. Strontium-90 (${}^{90}_{38}\\mathrm{Sr}$) decays by $\\beta^-$. What is the daughter? How many neutrons does the daughter nucleus have?",
      s: "Daughter: $A = 90$, $Z = 39$ (yttrium, ${}^{90}_{39}\\mathrm{Y}$). Neutrons $= 90 - 39 = 51$." },
    { q: "9. In beta-plus decay, what happens to $A$ and $Z$?",
      s: "A proton turns into a neutron: $\\Delta Z = -1$, $\\Delta A = 0$." },
    { q: "10. Complete the beta-plus decay: ${}^{11}_{6}\\mathrm{C} \\to \\,?\\, + e^+ + \\nu_e$.",
      s: "Beta-plus: $A$ unchanged, $Z$ decreases by 1. Daughter: $A = 11$, $Z = 5$ (boron).\n\n${}^{11}_{6}\\mathrm{C} \\to {}^{11}_{5}\\mathrm{B} + e^+ + \\nu_e$." },
    { q: "11. How many protons and neutrons in ${}^{18}_{9}\\mathrm{F}$ (fluorine-18)? In the daughter nucleus after $\\beta^+$ decay?",
      s: "Fluorine-18: protons $= 9$, neutrons $= 9$.\n\nDaughter ${}^{18}_{8}\\mathrm{O}$: protons $= 8$, neutrons $= 18 - 8 = 10$." },
    { q: "12. In gamma decay, do $A$ and $Z$ change? What is emitted?",
      s: "No change: $\\Delta A = 0$, $\\Delta Z = 0$. A gamma photon ($\\gamma$) is emitted; the nucleus drops to a lower energy state." },
    { q: "13. In gamma decay, do the number of protons and the number of neutrons in the nucleus change?",
      s: "No. Gamma decay only releases energy (a photon). The same isotope remains; proton and neutron counts are unchanged." },
    { q: "14. Identify the decay type and the missing particle: ${}^{212}_{84}\\mathrm{Po} \\to {}^{208}_{82}\\mathrm{Pb} + \\,?$.",
      s: "$A$ decreases by 4, $Z$ by 2 $\\Rightarrow$ alpha decay. Missing particle: ${}^4_2\\alpha$." },
    { q: "15. Identify the decay type and the missing particle(s): ${}^{234}_{90}\\mathrm{Th} \\to {}^{234}_{91}\\mathrm{Pa} + \\,?$.",
      s: "$A$ unchanged, $Z$ increases by 1 $\\Rightarrow$ beta-minus. Missing: $e^- + \\bar{\\nu}_e$." },
    { q: "16. Identify the decay type and the missing particle(s): ${}^{11}_{6}\\mathrm{C} \\to {}^{11}_{5}\\mathrm{B} + \\,?$.",
      s: "$A$ unchanged, $Z$ decreases by 1 $\\Rightarrow$ beta-plus. Missing: $e^+ + \\nu_e$." },
    { q: "17. Find the missing mass number: ${}^{A}_{92}\\mathrm{U} \\to {}^{234}_{90}\\mathrm{Th} + {}^4_2\\alpha$. What is $A$?",
      s: "Alpha: daughter $A = 234$, so parent $A = 234 + 4 = 238$. So $A = 238$." },
    { q: "18. In the decay ${}^{32}_{15}\\mathrm{P} \\to {}^{32}_{Z}\\mathrm{Y} + e^- + \\bar{\\nu}_e$, find $Z$ and name the daughter element.",
      s: "Beta-minus: $Z$ of daughter $= 15 + 1 = 16$. Element with $Z = 16$ is sulfur (S)." },
    { q: "19. In the decay ${}^{18}_{9}\\mathrm{F} \\to {}^{18}_{Z}\\mathrm{Y} + e^+ + \\nu_e$, find $Z$ and name the daughter element.",
      s: "Beta-plus: $Z$ of daughter $= 9 - 1 = 8$. Element with $Z = 8$ is oxygen (O)." },
    { q: "20. In a neutral atom of ${}^{14}_{6}\\mathrm{C}$, how many electrons? After $\\beta^-$ decay, the daughter is ${}^{14}_{7}\\mathrm{N}$. In a neutral nitrogen atom, how many electrons?",
      s: "Neutral atom: electrons $= Z$. Carbon-14: 6 electrons. Neutral nitrogen-14: 7 electrons." },
    { q: "21. In a neutral atom of ${}^{11}_{5}\\mathrm{B}$ (the daughter of ${}^{11}_{6}\\mathrm{C}$ after $\\beta^+$ decay), how many electrons?",
      s: "For a neutral atom, electrons $= Z = 5$." },
    { q: "22. Polonium-214 has $Z = 84$. How many protons, neutrons, and electrons in a neutral ${}^{214}_{84}\\mathrm{Po}$ atom? After alpha decay the daughter is lead (Pb). How many p, n, e in a neutral daughter atom?",
      s: "Po-214 (neutral): protons $= 84$, neutrons $= 130$, electrons $= 84$.\n\nDaughter ${}^{210}_{82}\\mathrm{Pb}$ (neutral): protons $= 82$, neutrons $= 128$, electrons $= 82$." },
    { q: "23. After an alpha or beta decay, the daughter nucleus is often in an excited state. What type of decay usually happens next?",
      s: "Gamma decay. The nucleus emits one or more $\\gamma$ photons to reach the ground state." },
    { q: "24. What is the half-life $T_{1/2}$ in terms of the decay constant $\\lambda$? After $n$ half-lives, what fraction of nuclei remain?",
      s: "$T_{1/2} = \\frac{\\ln 2}{\\lambda} = \\frac{0.693}{\\lambda}$. After $n$ half-lives: $N = N_0 \\cdot 2^{-n}$ (fraction $2^{-n}$)." },
    { q: "25. A sample has initial activity $A_0$. What is the activity after one half-life?",
      s: "Activity $A(t) = A_0 e^{-\\lambda t}$. After one half-life, $A = A_0/2$." },
    { q: "26. How many half-lives must pass for the number of nuclei to drop to $\\frac{1}{8}$ of the initial?",
      s: "$N/N_0 = 2^{-n} = 1/8 = 2^{-3}$, so $n = 3$ half-lives." },
    { q: "27. Complete and identify the decay: ${}^{234}_{91}\\mathrm{Pa} \\to {}^{234}_{92}\\mathrm{U} + \\,?$.",
      s: "$A$ unchanged, $Z$ increases by 1 $\\Rightarrow$ beta-minus. ${}^{234}_{91}\\mathrm{Pa} \\to {}^{234}_{92}\\mathrm{U} + e^- + \\bar{\\nu}_e$." },
    { q: "28. Write the full alpha decay for radium-226 (${}^{226}_{88}\\mathrm{Ra}$). Give the daughter's $A$, $Z$, and symbol.",
      s: "${}^{226}_{88}\\mathrm{Ra} \\to {}^{222}_{86}\\mathrm{Rn} + {}^4_2\\alpha$. Daughter: $A = 222$, $Z = 86$, radon (Rn)." },
    { q: "29. Write the full beta-minus decay for phosphorus-32 (${}^{32}_{15}\\mathrm{P}$). Give the daughter's $A$, $Z$, and symbol.",
      s: "${}^{32}_{15}\\mathrm{P} \\to {}^{32}_{16}\\mathrm{S} + e^- + \\bar{\\nu}_e$. Daughter: $A = 32$, $Z = 16$, sulfur (S)." },
    { q: "30. Write the full beta-plus decay for carbon-11. Give the daughter's $A$, $Z$, and symbol.",
      s: "${}^{11}_{6}\\mathrm{C} \\to {}^{11}_{5}\\mathrm{B} + e^+ + \\nu_e$. Daughter: $A = 11$, $Z = 5$, boron (B)." },
    { q: "31. A nucleus has $A = 222$, $Z = 86$. It decays by alpha. What are $A$ and $Z$ of the daughter?",
      s: "Alpha: $A' = 222 - 4 = 218$, $Z' = 86 - 2 = 84$." },
    { q: "32. A nucleus has $A = 40$, $Z = 19$. It decays by $\\beta^-$. What are $A$ and $Z$ of the daughter?",
      s: "Beta-minus: $A' = 40$, $Z' = 19 + 1 = 20$." },
    { q: "33. A nucleus has $A = 18$, $Z = 9$. It decays by $\\beta^+$. What are $A$ and $Z$ of the daughter?",
      s: "Beta-plus: $A' = 18$, $Z' = 9 - 1 = 8$." },
    { q: "34. In gamma decay, do the parent and daughter have the same $A$ and $Z$?",
      s: "Yes. Gamma decay does not change $A$ or $Z$; only the energy state of the nucleus changes." },
    { q: "35. How many neutrons in ${}^{238}_{92}\\mathrm{U}$? How many protons and neutrons in the alpha particle ${}^4_2\\alpha$?",
      s: "Uranium-238: neutrons $= 238 - 92 = 146$.\n\nAlpha particle: protons $= 2$, neutrons $= 4 - 2 = 2$." },
    { q: "36. In a neutral atom of ${}^{90}_{38}\\mathrm{Sr}$, how many electrons? In a neutral atom of the daughter ${}^{90}_{39}\\mathrm{Y}$ after $\\beta^-$ decay?",
      s: "Neutral atom: electrons $= Z$. Sr-90: 38 electrons. Y-90: 39 electrons." },
    { q: "37. Fill in the indices: ${}^{226}_{88}\\mathrm{Ra} \\to {}^{\\,?\\,}_{\\,?\\,}\\mathrm{Rn} + {}^4_2\\alpha$.",
      s: "Alpha: daughter $A = 226 - 4 = 222$, $Z = 88 - 2 = 86$. So ${}^{222}_{86}\\mathrm{Rn}$." },
    { q: "38. Fill in the indices: ${}^{14}_{6}\\mathrm{C} \\to {}^{\\,?\\,}_{\\,?\\,}\\mathrm{N} + e^- + \\bar{\\nu}_e$.",
      s: "Beta-minus: daughter $A = 14$, $Z = 7$. So ${}^{14}_{7}\\mathrm{N}$." },
    { q: "39. Fill in the indices: ${}^{11}_{6}\\mathrm{C} \\to {}^{\\,?\\,}_{\\,?\\,}\\mathrm{B} + e^+ + \\nu_e$.",
      s: "Beta-plus: daughter $A = 11$, $Z = 5$. So ${}^{11}_{5}\\mathrm{B}$." },
    { q: "40. Name all four types of nuclear decay or transformation we have used. For each, state the change in $A$ and $Z$.",
      s: "(1) Alpha: $\\Delta A = -4$, $\\Delta Z = -2$.\n(2) Beta-minus: $\\Delta A = 0$, $\\Delta Z = +1$.\n(3) Beta-plus: $\\Delta A = 0$, $\\Delta Z = -1$.\n(4) Gamma: $\\Delta A = 0$, $\\Delta Z = 0$." }
  ],

  Medium: [
    {
      q: "1. A sample of radon-222 ($T_{1/2} = 3.82\\,\\text{d}$) has $5.0 \\times 10^{12}$ nuclei. Find the decay constant $\\lambda$ (in $\\text{s}^{-1}$) and the initial activity.",
      s: "$\\lambda = \\frac{\\ln 2}{T_{1/2}} = \\frac{0.693}{3.82 \\times 24 \\times 3600}\\,\\text{s}^{-1} = \\frac{0.693}{330\\,048} = 2.10 \\times 10^{-6}\\,\\text{s}^{-1}$.\n\nActivity $A_0 = \\lambda N_0 = (2.10 \\times 10^{-6})(5.0 \\times 10^{12}) = 1.05 \\times 10^7\\,\\text{Bq}$."
    },
    {
      q: "2. Phosphorus-32 decays by $\\beta^-$ to sulfur-32. Write the full decay equation and state what else is emitted.",
      s: "${}^{32}_{15}\\mathrm{P} \\to {}^{32}_{16}\\mathrm{S} + e^- + \\bar{\\nu}_e$.\n\nBesides the electron ($e^-$), an electron antineutrino ($\\bar{\\nu}_e$) is emitted to conserve lepton number and share kinetic energy."
    },
    {
      q: "3. Fluorine-18 is used in PET imaging and decays by $\\beta^+$. Write the decay equation and name the daughter.",
      s: "Beta-plus: $A$ unchanged, $Z$ decreases by 1. Fluorine has $Z = 9$.\n\n${}^{18}_{9}\\mathrm{F} \\to {}^{18}_{8}\\mathrm{O} + e^+ + \\nu_e$.\n\nThe daughter is oxygen-18 (${}^{18}_{8}\\mathrm{O}$)."
    },
    {
      q: "4. Uranium-238 decays to thorium-234. Which decay type is this? Write the full equation.",
      s: "238 $\\to$ 234 ($\\Delta A = -4$) and 92 $\\to$ 90 ($\\Delta Z = -2$): alpha decay.\n\n${}^{238}_{92}\\mathrm{U} \\to {}^{234}_{90}\\mathrm{Th} + {}^4_2\\alpha$."
    },
    {
      q: "5. A sample starts with $N_0$ nuclei. After 2 half-lives, what fraction of nuclei remain? What fraction have decayed?",
      s: "After $n$ half-lives: $N = N_0 \\cdot 2^{-n}$.\n\nFor $n = 2$: $N = N_0/4$. Fraction remaining: $\\frac{1}{4}$.\n\nFraction decayed: $1 - \\frac{1}{4} = \\frac{3}{4}$."
    },
    {
      q: "6. The activity of a source drops from $800\\,\\text{Bq}$ to $100\\,\\text{Bq}$. How many half-lives have passed?",
      s: "$A = A_0 \\cdot 2^{-n}$ so $\\frac{A}{A_0} = 2^{-n}$.\n\n$\\frac{100}{800} = \\frac{1}{8} = 2^{-3}$ $\\Rightarrow$ $n = 3$ half-lives."
    },
    {
      q: "7. In a decay chain, a nucleus first undergoes alpha decay, then the daughter undergoes beta-minus decay. For ${}^{228}_{88}\\mathrm{Ra}$, find the two daughters in sequence.",
      s: "First (alpha): ${}^{228}_{88}\\mathrm{Ra} \\to {}^{224}_{86}\\mathrm{Rn} + {}^4_2\\alpha$.\n\nSecond ($\\beta^-$ from ${}^{224}_{86}\\mathrm{Rn}$): ${}^{224}_{86}\\mathrm{Rn} \\to {}^{224}_{87}\\mathrm{Fr} + e^- + \\bar{\\nu}_e$.\n\nSo: Ra-228 $\\to$ Rn-224 $\\to$ Fr-224."
    },
    {
      q: "8. Cobalt-60 decays by $\\beta^-$ to nickel-60, and the nickel-60 is produced in an excited state, then emits two gamma photons. Why does $\\gamma$ emission not change the identity of the nucleus?",
      s: "Gamma decay is emission of a photon from an excited nuclear state. It only carries away energy (and angular momentum), not nucleons. So mass number $A$ and atomic number $Z$ stay the same — same isotope, lower energy state."
    },
    {
      q: "9. The half-life of iodine-131 is 8.0 days. What is the decay constant $\\lambda$ in $\\text{d}^{-1}$?",
      s: "$\\lambda = \\frac{\\ln 2}{T_{1/2}} = \\frac{0.693}{8.0} = 0.0866\\,\\text{d}^{-1}$ (about $8.66 \\times 10^{-2}\\,\\text{d}^{-1}$)."
    },
    {
      q: "10. A nucleus ${}^{A}_{Z}X$ decays by emitting two alpha particles in succession. What are the new $A$ and $Z$?",
      s: "Each alpha: $\\Delta A = -4$, $\\Delta Z = -2$.\n\nAfter two alphas: $A' = A - 8$, $Z' = Z - 4$."
    },
    {
      q: "11. Potassium-40 can decay by $\\beta^-$ to calcium-40 or by $\\beta^+$ (or electron capture) to argon-40. For the $\\beta^-$ branch, write the equation.",
      s: "${}^{40}_{19}\\mathrm{K} \\to {}^{40}_{20}\\mathrm{Ca} + e^- + \\bar{\\nu}_e$.\n\n($Z = 19$ for K, $Z = 20$ for Ca; $A$ stays 40.)"
    },
    {
      q: "12. Thorium-234 decays by $\\beta^-$ to protactinium-234. Write the equation. What else is emitted?",
      s: "${}^{234}_{90}\\mathrm{Th} \\to {}^{234}_{91}\\mathrm{Pa} + e^- + \\bar{\\nu}_e$.\n\nAn electron antineutrino $\\bar{\\nu}_e$ is also emitted."
    },
    {
      q: "13. Polonium-214 decays by alpha to lead-210. Write the equation. (Po has $Z=84$, Pb has $Z=82$.)",
      s: "${}^{214}_{84}\\mathrm{Po} \\to {}^{210}_{82}\\mathrm{Pb} + {}^4_2\\alpha$.\n\nCheck: $214 - 4 = 210$, $84 - 2 = 82$."
    },
    {
      q: "14. If a nucleus has too many neutrons (above the valley of stability), it tends to decay by $\\beta^-$ or $\\beta^+$?",
      s: "Too many neutrons: it tends to undergo beta-minus decay ($n \\to p + e^- + \\bar{\\nu}_e$), converting a neutron into a proton and moving toward the stability line."
    },
    {
      q: "15. If a nucleus has too many protons (above the valley of stability), it may decay by $\\beta^+$ or electron capture. What happens to $Z$ in $\\beta^+$ decay?",
      s: "In beta-plus decay a proton becomes a neutron, so $Z$ decreases by 1. That reduces the proton excess and moves the nucleus toward stability."
    },
    {
      q: "16. The decay constant of a radioisotope is $2.0 \\times 10^{-5}\\,\\text{s}^{-1}$. Find its half-life in seconds and in hours.",
      s: "$T_{1/2} = \\frac{\\ln 2}{\\lambda} = \\frac{0.693}{2.0 \\times 10^{-5}} = 34\\,650\\,\\text{s}$.\n\nIn hours: $\\frac{34\\,650}{3600} = 9.6\\,\\text{h}$ (approximately)."
    },
    {
      q: "17. After gamma emission, are the mass number and atomic number of the nucleus different?",
      s: "No. Gamma decay does not change $A$ or $Z$. Only the internal energy state of the nucleus changes; the isotope remains the same."
    },
    {
      q: "18. Radium-226 undergoes alpha decay to radon-222. Radon-222 is also alpha-active. Write both decay equations.",
      s: "${}^{226}_{88}\\mathrm{Ra} \\to {}^{222}_{86}\\mathrm{Rn} + {}^4_2\\alpha$.\n\n${}^{222}_{86}\\mathrm{Rn} \\to {}^{218}_{84}\\mathrm{Po} + {}^4_2\\alpha$ (polonium-218)."
    },
    {
      q: "19. A source has activity $400\\,\\text{Bq}$ and half-life $1\\,\\text{h}$. Estimate the number of radioactive nuclei present. ($1\\,\\text{Bq} = 1\\,\\text{s}^{-1}$.)",
      s: "$A = \\lambda N$, and $\\lambda = \\frac{\\ln 2}{T_{1/2}} = \\frac{0.693}{3600}\\,\\text{s}^{-1}$.\n\n$N = \\frac{A}{\\lambda} = \\frac{400}{0.693/3600} = \\frac{400 \\times 3600}{0.693} \\approx 2.08 \\times 10^6$ nuclei."
    },
    {
      q: "20. Complete the decay and identify the type: ${}^{234}_{91}\\mathrm{Pa} \\to {}^{234}_{92}\\mathrm{U} + \\,?$.",
      s: "$A$ unchanged (234), $Z$ increases by 1 (91 $\\to$ 92). This is beta-minus decay.\n\n${}^{234}_{91}\\mathrm{Pa} \\to {}^{234}_{92}\\mathrm{U} + e^- + \\bar{\\nu}_e$."
    }
  ]
};

let activeTab = "Simple";

/* ------------------ UI FUNCTIONS ------------------ */
function toggleFormulas() {
  const box = document.getElementById("formulaBox");
  const arrow = document.getElementById("formulaArrow");
  box.classList.toggle("hidden");
  arrow.textContent = box.classList.contains("hidden") ? "▼" : "▲";
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderQuestions();
}

function renderQuestions() {
  const list = document.getElementById("questionList");
  list.innerHTML = "";

  questions[activeTab].forEach((item) => {
    const card = document.createElement("div");
    card.className = "bg-white rounded-2xl border shadow-sm p-6";

    const q = document.createElement("div");
    q.className = "text-lg mb-4";
    renderMath(q, item.q);

    const btn = document.createElement("button");
    btn.className = "text-emerald-600 font-bold text-sm uppercase";
    btn.textContent = "Show Solution";

    const sol = document.createElement("div");
    sol.className = "hidden mt-4 bg-slate-50 p-4 rounded-xl animate-slide";

    const solText = document.createElement("div");
    solText.className = "whitespace-pre-line";
    renderMath(solText, item.s);

    sol.appendChild(solText);

    btn.onclick = () => {
      sol.classList.toggle("hidden");
      btn.textContent = sol.classList.contains("hidden")
        ? "Show Solution"
        : "Hide Solution";
    };

    card.append(q, btn, sol);
    list.appendChild(card);
  });
}

/* ------------------ INIT ------------------ */
window.onload = () => {
  const fBox = document.getElementById("formulaBox");
  formulas.forEach(([name, f]) => {
    const row = document.createElement("div");
    row.className = "flex justify-between border-b py-2";
    const n = document.createElement("span");
    n.textContent = name;
    n.className = "font-semibold text-slate-600 text-sm";
    const fx = document.createElement("span");
    renderMath(fx, f);
    row.append(n, fx);
    fBox.appendChild(row);
  });

  renderQuestions();
};
</script>

<style>
.tab-btn {
  flex: 1;
  padding: 0.75rem;
  border-radius: 0.75rem;
  font-weight: 600;
  color: #475569;
}
.tab-btn.active {
  background: white;
  color: #059669;
}
</style>

</body>
</html>
